name: tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install lightweight test dependencies
        # Avoid pulling torch / mediapipe / opencv on CI — they are heavy and
        # not needed for the metric-level unit tests. Install only what the
        # tested modules actually import.
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy pytest

      - name: Install package (no extras)
        run: |
          pip install --no-deps -e .

      - name: Run unit tests
        run: |
          pytest tests/test_selective_metrics.py tests/test_conformal.py -v
