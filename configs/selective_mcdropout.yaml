# Selective prediction via MC Dropout.
# Inherits classifier architecture from baseline_physnet.yaml,
# adds dropout-at-inference for epistemic uncertainty estimates.

experiment:
  name: selective_mcdropout
  seed: 42
  device: cuda
  base_config: configs/baseline_physnet.yaml

uncertainty:
  method: mc_dropout
  dropout_rate: 0.2
  num_mc_samples: 30
  uncertainty_metric: predictive_entropy   # or mutual_information

selective:
  deferral_policy: threshold_on_entropy
  target_coverages: [1.0, 0.95, 0.9, 0.8, 0.7, 0.5]
  combine_with_signal_quality: true
  signal_quality_weight: 0.3

eval:
  metrics:
    - risk_coverage_curve
    - aurc
    - selective_accuracy_at_coverage
    - ece
    - brier_score
  bootstrap_samples: 1000
